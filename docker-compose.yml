services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: "8000"
      HOST: "0.0.0.0"
      DATABASE_URL: "sqlite:////tmp/workout_app.db"
      CORS_ORIGINS: "*"
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "/api"
        NEXT_PUBLIC_STATIC_URL: "/exercises-static"
    depends_on:
      - backend
    ports:
      - "3000:80"
