<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Planów Treningowych</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Generator Planów Treningowych</h1>
            <p>Stwórz swój spersonalizowany plan treningowy w kilka sekund!</p>
        </header>
        
        <main>
            <section class="form-section">
                <form id="plan-form">
                    <div class="form-group">
                        <label for="weight">Masa ciała (kg):</label>
                        <input type="number" id="weight" name="weight" step="0.1" required placeholder="np. 75">
                    </div>
                    
                    <div class="form-group">
                        <label for="height">Wzrost (cm):</label>
                        <input type="number" id="height" name="height" required placeholder="np. 180">
                    </div>
                    
                    <div class="form-group">
                        <label for="days">Ilość dni treningowych w tygodniu (1-5):</label>
                        <input type="number" id="days" name="days" min="1" max="5" required placeholder="np. 3">
                    </div>
                    
                    <div class="form-group">
                        <label>Zablokowane partie (kontuzje / przeciwskazania):</label>
                        <p class="help-text">Zaznacz partie, których NIE MOŻESZ trenować.</p>
                        <div class="checkbox-group" id="muscles-container">
                            <!-- JS wygeneruje checkboxy -->
                        </div>
                    </div>
                    
                    <button type="submit" class="btn">Generuj Plan</button>
                </form>
            </section>
            
            <section id="results" class="results-section hidden">
                <h2>Twój Plan Treningowy</h2>
                <div id="plan-container"></div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
